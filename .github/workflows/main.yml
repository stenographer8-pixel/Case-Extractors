name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip project (if uploaded as a zip)
        run: |
          if [ -f CaseExtractor.zip ]; then
            unzip -o CaseExtractor.zip -d extracted
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Debug APK
        run: |
          if [ -d extracted/CaseExtractor ]; then
            cd extracted/CaseExtractor && gradle assembleDebug
          else
            gradle assembleDebug
          fi

      - name: Find APK path
        id: findapk
        run: |
          APKPATH=$(find . -name "app-debug.apk" | head -n 1)
          echo "apkpath=$APKPATH" >> $GITHUB_OUTPUT

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CaseExtractor-debug-apk
          path: ${{ steps.findapk.outputs.apkpath }}
