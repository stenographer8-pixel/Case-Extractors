name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip everything found
        run: |
          find . -maxdepth 2 -iname "*.zip" -exec unzip -o {} -d extracted \;
          echo "----- Repo contents after unzip -----"
          find . -maxdepth 4 -not -path "./.git*"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Find project root and build
        run: |
          PROJECT_DIR=$(find . -name "settings.gradle" -not -path "*/.git/*" -exec dirname {} \; | head -n 1)
          echo "Found project at: $PROJECT_DIR"
          if [ -z "$PROJECT_DIR" ]; then
            echo "No settings.gradle found anywhere in the repo!"
            exit 1
          fi
          cd "$PROJECT_DIR" && gradle assembleDebug

      - name: Find APK path
        id: findapk
        run: |
          APKPATH=$(find . -name "app-debug.apk" | head -n 1)
          echo "Found APK at: $APKPATH"
          echo "apkpath=$APKPATH" >> $GITHUB_OUTPUT

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CaseExtractor-debug-apk
          path: ${{ steps.findapk.outputs.apkpath }}
